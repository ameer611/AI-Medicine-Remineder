services:
  mysql:
    image: mysql:8.0
    container_name: dori_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: dori_scheduler
      MYSQL_USER: dori
      MYSQL_PASSWORD: secret
      TZ: Asia/Tashkent  # Sets the DB internal clock
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "dori", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: dori_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql+aiomysql://dori:secret@mysql:3306/dori_scheduler
      - BOT_USERNAME=${BOT_USERNAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_DAYS=${JWT_EXPIRE_DAYS}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - SUPERVISOR_INVITE_CODE=${SUPERVISOR_INVITE_CODE}
      - TZ=Asia/Tashkent
    ports:
      - "8000:8000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: python run_api.py

  bot:
    build: .
    container_name: dori_bot
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql+aiomysql://dori:secret@mysql:3306/dori_scheduler
      - API_BASE_URL=http://api:8000
      - BOT_USERNAME=${BOT_USERNAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_DAYS=${JWT_EXPIRE_DAYS}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - SUPERVISOR_INVITE_CODE=${SUPERVISOR_INVITE_CODE}
      - TZ=Asia/Tashkent
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: python run_bot.py

  frontend:
    image: node:20-alpine
    container_name: dori_frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - TZ=Asia/Tashkent

volumes:
  mysql_data:
  frontend_node_modules: